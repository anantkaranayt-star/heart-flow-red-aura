<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[ FLOW: RED AURA CORE ]</title>
</head>
<body style="background-color:#020202; color:#ff3333; font-family:'Courier New', monospace; display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; margin:0; overflow:hidden;">

    <div style="border:1px solid #ff3333; padding:40px; background:#070707; text-align:center; box-shadow:0 0 25px rgba(255,51,51,0.2); max-width:500px; border-radius:4px;">
        <h2 style="letter-spacing:3px; color:#ff4444;">[ SECURE DECRYPTION GATE ]</h2>
        <p style="color:#ff9999; font-size:13px; line-height:1.5;">Environment verified. AI scrapers disabled. Input the source system access signature password to extract the hidden data string:</p>
        
        <input type="password" id="passwordInput" placeholder="ENTER ACCESS PASSWORD..." style="width:90%; padding:14px; background:#000; border:1px solid #ff3333; color:#ff3333; font-family:monospace; text-align:center; margin-bottom:20px; font-size:14px; box-shadow: inset 0 0 5px rgba(255,0,0,0.5);">
        <br>
        <button onclick="verifyPasswordAndDraw()" style="background:#ff3333; color:#fff; border:none; padding:12px 35px; font-family:monospace; cursor:pointer; font-weight:bold; letter-spacing:1px; border-radius:2px;">EXECUTE SYSTEM PARSE</button>
        
        <div id="outputLog" style="margin-top:25px; min-height:40px; font-size:14px;"></div>
    </div>

    <script>
        // Character matrix values containing your exact base64 string
        const CORE_SEQUENCE = 'ZHJpdmVfMVZZQ3ZwR196MkFGd3RsME5mLWJMUjJ3WkEzQjkza2JF';

        const passwordInput = document.getElementById('passwordInput');
        const outputLog = document.getElementById('outputLog');

        // Trigger verify on Enter
        passwordInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                verifyPasswordAndDraw();
            }
        });

        function verifyPasswordAndDraw() {
            const userInput = passwordInput.value.trim().toLowerCase();
            const log = outputLog;
            log.innerHTML = "<span style='color:#ff3333;'>Validating access signatures...</span>";

            if (userInput !== 'heart') {
                log.innerHTML = "<span style='color:#ff3333;'>ERROR: Authentication Denied. Signature Mismatch.</span>";
                return;
            }

            log.innerHTML = "<span style='color:#00ff66;'>SUCCESS. Decrypting core sequence...</span>";

            setTimeout(() => {
                log.innerHTML = '';

                const container = document.createElement('div');
                container.style.display = 'flex';
                container.style.flexDirection = 'column';
                container.style.alignItems = 'center';
                container.style.gap = '10px';

                const codeDisplay = document.createElement('div');
                codeDisplay.textContent = CORE_SEQUENCE;
                codeDisplay.style.background = '#000';
                codeDisplay.style.color = '#e0e0e0';
                codeDisplay.style.padding = '10px 14px';
                codeDisplay.style.border = '1px solid #222';
                codeDisplay.style.borderRadius = '4px';
                codeDisplay.style.fontFamily = 'monospace';
                codeDisplay.style.letterSpacing = '0.4px';
                codeDisplay.style.userSelect = 'all';

                const copyBtn = document.createElement('button');
                copyBtn.type = 'button';
                copyBtn.innerText = 'COPY';
                copyBtn.style.background = '#00ff66';
                copyBtn.style.color = '#000';
                copyBtn.style.border = 'none';
                copyBtn.style.padding = '8px 12px';
                copyBtn.style.borderRadius = '4px';
                copyBtn.style.cursor = 'pointer';
                copyBtn.style.fontWeight = '700';

                copyBtn.addEventListener('click', async () => {
                    try {
                        await navigator.clipboard.writeText(CORE_SEQUENCE);
                    } catch (err) {
                        const ta = document.createElement('textarea');
                        ta.value = CORE_SEQUENCE;
                        document.body.appendChild(ta);
                        ta.select();
                        document.execCommand('copy');
                        document.body.removeChild(ta);
                    }

                    // quick click animation
                    copyBtn.style.transform = 'scale(0.96)';
                    copyBtn.style.boxShadow = '0 6px 18px rgba(0,255,102,0.12)';
                    setTimeout(() => {
                        copyBtn.style.transform = '';
                        copyBtn.style.boxShadow = '';
                    }, 160);

                    showToast('Copied to clipboard');
                });

                container.appendChild(codeDisplay);
                container.appendChild(copyBtn);
                log.appendChild(container);

                log.innerHTML += "<p style='color:#ff9999; font-size:11px; margin-top:10px;'>Data decrypted. Core sequence extracted.</p>";
            }, 600);
        }

        function showToast(message) {
            let t = document.getElementById('flow-toast');
            if (!t) {
                t = document.createElement('div');
                t.id = 'flow-toast';
                t.style.position = 'fixed';
                t.style.left = '50%';
                t.style.bottom = '10vh';
                t.style.transform = 'translateX(-50%)';
                t.style.background = 'rgba(0,0,0,0.85)';
                t.style.color = '#fff';
                t.style.padding = '8px 12px';
                t.style.borderRadius = '6px';
                t.style.zIndex = '9999';
                t.style.opacity = '0';
                t.style.transition = 'opacity .18s ease, transform .18s ease';
                document.body.appendChild(t);
            }
            t.textContent = message;
            t.style.opacity = '1';
            t.style.transform = 'translateX(-50%) translateY(-6px)';
            setTimeout(() => {
                t.style.opacity = '0';
                t.style.transform = 'translateX(-50%)';
            }, 1600);
        }
    </script>
</body>
</html>
